---
name: "IRCamera CodeQL Configuration"

# Disable default queries and use custom query suite
disable-default-queries: false

# Include additional query suites for comprehensive analysis
queries:
  - uses: security-extended
  - uses: security-and-quality

# Path-based filters to focus analysis on relevant code
paths:
  - "app/src/"
  - "*/src/"
  - "BleModule/src/"
  - "component/*/src/"
  - "lib*/src/"
  - "RangeSeekBar/src/"

# Exclude paths that don't need security analysis
paths-ignore:
  - "**/*.gradle"
  - "**/*.gradle.kts"
  - "**/build/"
  - "**/gradle/"
  - "**/.gradle/"
  - "**/generated/"
  - "**/test/"
  - "**/androidTest/"
  - "**/debug/"
  - "docs/"
  - "tools/"
  - ".github/"
  - "pc-controller/"

# Packs for additional security and quality rules
packs:
  - codeql/java-queries
  - codeql/kotlin-queries

# Custom queries for Android-specific security issues
query-filters:
  - include:
      kind:
        - problem
        - path-problem
      severity:
        - error
        - warning
        - recommendation
      precision:
        - high
        - medium
      tags:
        - security
        - android
        - correctness
        - maintainability

# External data for enhanced analysis
external-repository-token-stdin: false
