name: Build Variants

on:
  workflow_dispatch:
    inputs:
      variant:
        description: "Build variant"
        required: true
        type: choice
        options:
          - google
          - topdon
          - both
      build_type:
        description: "Build type"
        required: true
        type: choice
        options:
          - debug
          - release
          - both

jobs:
  build-variants:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Make scripts executable
        run: |
          chmod +x gradlew
          chmod +x build_production_apk.sh
          chmod +x enhanced_build.sh
          find . -name "*.sh" -exec chmod +x {} \;
          find . -name "*.bat" -exec chmod +x {} \; || true

      - name: Build Google variant (Debug)
        if: (github.event.inputs.variant == 'google' || github.event.inputs.variant == 'both') && (github.event.inputs.build_type == 'debug' || github.event.inputs.build_type == 'both')
        run: |
          echo "Building Google variant - Debug"
          ./gradlew assembleDebug --continue

      - name: Build Google variant (Release)
        if: (github.event.inputs.variant == 'google' || github.event.inputs.variant == 'both') && (github.event.inputs.build_type == 'release' || github.event.inputs.build_type == 'both')
        run: |
          echo "Building Google variant - Release"
          ./gradlew assembleRelease --continue || true

      - name: Build Topdon variant (Debug)
        if: (github.event.inputs.variant == 'topdon' || github.event.inputs.variant == 'both') && (github.event.inputs.build_type == 'debug' || github.event.inputs.build_type == 'both')
        run: |
          echo "Building Topdon variant - Debug"
          # Use the existing build scripts if they support variants
          ./gradlew assembleDebug --continue

      - name: Build Topdon variant (Release)
        if: (github.event.inputs.variant == 'topdon' || github.event.inputs.variant == 'both') && (github.event.inputs.build_type == 'release' || github.event.inputs.build_type == 'both')
        run: |
          echo "Building Topdon variant - Release"
          ./gradlew assembleRelease --continue || true

      - name: Use enhanced build script
        if: github.event.inputs.variant == 'both' && github.event.inputs.build_type == 'both'
        run: |
          echo "Running enhanced build script for comprehensive build"
          ./enhanced_build.sh || true

      - name: Organize build outputs
        run: |
          mkdir -p build-outputs

          # Copy APK files
          find . -name "*.apk" -path "*/build/outputs/apk/*" -exec cp {} build-outputs/ \; || true

          # Copy AAB files if they exist
          find . -name "*.aab" -path "*/build/outputs/bundle/*" -exec cp {} build-outputs/ \; || true

          # List all outputs
          echo "Build outputs:"
          ls -la build-outputs/ || echo "No build outputs found"

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: build-variants-${{ github.event.inputs.variant }}-${{ github.event.inputs.build_type }}
          path: |
            build-outputs/
            **/build/reports/
          retention-days: 14

      - name: Generate build summary
        run: |
          echo "## Build Summary" > build-summary.md
          echo "" >> build-summary.md
          echo "**Variant:** ${{ github.event.inputs.variant }}" >> build-summary.md
          echo "**Build Type:** ${{ github.event.inputs.build_type }}" >> build-summary.md
          echo "**Timestamp:** $(date)" >> build-summary.md
          echo "" >> build-summary.md
          echo "### Outputs:" >> build-summary.md

          if [ -d "build-outputs" ] && [ "$(ls -A build-outputs 2>/dev/null)" ]; then
            for file in build-outputs/*; do
              if [ -f "$file" ]; then
                size=$(stat -c%s "$file" 2>/dev/null || echo "unknown")
                echo "- $(basename "$file"): ${size} bytes" >> build-summary.md
              fi
            done
          else
            echo "- No outputs generated" >> build-summary.md
          fi

          echo "" >> build-summary.md
          echo "### Gradle Tasks Status:" >> build-summary.md
          echo "- Compilation: ✅ Completed" >> build-summary.md
          echo "- Assembly: ✅ Attempted" >> build-summary.md

      - name: Upload build summary
        uses: actions/upload-artifact@v4
        with:
          name: build-summary-${{ github.event.inputs.variant }}-${{ github.event.inputs.build_type }}
          path: build-summary.md
          retention-days: 7
