---
name: "CodeQL Security Analysis"

"on":
  push:
    branches: [main, develop, 'copilot/**']
  pull_request:
    branches: [main, develop]
  schedule:
    # Run CodeQL analysis every Tuesday at 2:30 AM UTC
    - cron: '30 2 * * 2'

permissions:
  actions: read
  contents: read
  security-events: write

jobs:
  analyze:
    name: CodeQL Analysis
    runs-on: ubuntu-latest
    timeout-minutes: 45

    strategy:
      fail-fast: false
      matrix:
        language: [java, kotlin]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          # Fetch full history for accurate analysis
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: >-
            ${{ runner.os }}-gradle-${{
            hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
          config-file: ./.github/codeql/codeql-config.yml
          # Override default queries to include security and quality queries
          queries: +security-extended,security-and-quality

      - name: Grant execute permissions
        run: |
          chmod +x gradlew
          chmod +x dev.sh
          find . -name "*.sh" -type f -exec chmod +x {} \;

      - name: Build Android project
        run: |
          # Clean build to ensure fresh analysis
          ./gradlew clean

          # Build all modules for comprehensive analysis
          timeout 600 ./gradlew build -x test -x lint --no-daemon --parallel
        env:
          GRADLE_OPTS: -Xmx4g -XX:MaxMetaspaceSize=1g

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:${{ matrix.language }}"
          # Upload SARIF file for detailed results
          upload: true

      - name: Upload CodeQL results as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: codeql-results-${{ matrix.language }}
          path: |
            **/*.sarif
            **/codeql-databases/
          retention-days: 30

  codeql-summary:
    name: CodeQL Summary Report
    runs-on: ubuntu-latest
    needs: analyze
    if: always()

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download CodeQL artifacts
        uses: actions/download-artifact@v4
        with:
          path: codeql-results/

      - name: Generate CodeQL summary
        run: |
          mkdir -p reports/security/codeql

          # Generate comprehensive security report
          cat > reports/security/codeql/codeql-summary.md << EOF
          # CodeQL Security Analysis Summary

          **Generated**: $(date '+%Y-%m-%d %H:%M:%S UTC')
          **Commit**: ${{ github.sha }}
          **Branch**: ${{ github.ref_name }}
          **Workflow**: ${{ github.workflow }}

          ## Analysis Overview

          This report summarizes the CodeQL static analysis results for the
          IRCamera Android application, focusing on security vulnerabilities
          and code quality issues in Kotlin and Java codebases.

          ### Languages Analyzed
          - **Java**: Android application components, utilities, native interfaces
          - **Kotlin**: Modern Android components, coroutines, sensor integrations

          ### Analysis Scope
          - **Total Modules**: \$(find . -name "build.gradle.kts" -o -name "build.gradle" | wc -l) modules analyzed
          - **Source Files**:
            - Java: \$(find . -name "*.java" -not -path "./build/*" | wc -l) files
            - Kotlin: \$(find . -name "*.kt" -not -path "./build/*" | wc -l) files

          ## Key Security Areas Covered

          ### 🔒 **Security Vulnerabilities**
          - SQL injection prevention
          - Cross-site scripting (XSS) protection
          - Path traversal vulnerabilities
          - Weak cryptography usage
          - Hardcoded credentials detection
          - Android-specific security issues

          ### 🛡️ **Android Security Focus**
          - Intent injection vulnerabilities
          - Unsafe dynamic loading
          - Broadcast receiver security
          - Content provider vulnerabilities
          - Network security configuration
          - Data exposure through logs

          ### 🏗️ **Code Quality Issues**
          - Null pointer dereferences
          - Resource leaks
          - Unused code detection
          - Deprecated API usage
          - Error handling problems
          - Performance anti-patterns

          ## Analysis Results

          ### Java Analysis
          - **Status**: ${{ needs.analyze.result }}
          - **Artifacts**: Available in workflow artifacts

          ### Kotlin Analysis
          - **Status**: ${{ needs.analyze.result }}
          - **Artifacts**: Available in workflow artifacts

          ## Recommendations

          ### Immediate Actions
          1. **Review High-Severity Issues**: Address any critical security
             vulnerabilities immediately
          2. **Fix Medium-Severity Issues**: Plan remediation for moderate
             security risks
          3. **Code Quality**: Address code quality issues that could lead
             to bugs

          ### Long-term Improvements
          1. **Security Training**: Ensure team understands secure coding
             practices
          2. **Regular Scanning**: Integrate CodeQL into development workflow
          3. **Security Guidelines**: Establish and follow security coding
             standards
          4. **Dependency Management**: Keep dependencies updated and secure

          ## Integration with CI/CD

          This CodeQL analysis is integrated with the comprehensive CI/CD pipeline:
          - **Automatic Scanning**: Runs on every push and pull request
          - **Scheduled Analysis**: Weekly deep scans for comprehensive coverage
          - **Artifact Retention**: Results stored for 30 days for historical
            analysis
          - **SARIF Upload**: Results uploaded to GitHub Security tab

          ## Resources

          - [CodeQL Documentation](https://codeql.github.com/docs/)
          - [Android Security Best Practices](https://developer.android.com/topic/security/best-practices)
          - [OWASP Mobile Security](https://owasp.org/www-project-mobile-security-testing-guide/)

          ---

          **Note**: This summary is generated automatically. For detailed
          findings, review the SARIF files and GitHub Security tab.
          EOF

      - name: Upload CodeQL summary report
        uses: actions/upload-artifact@v4
        with:
          name: codeql-summary-report
          path: reports/security/codeql/
          retention-days: 90
