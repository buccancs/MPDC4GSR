name: Dependency Security Check

on:
  schedule:
    # Run every Monday at 9:00 AM UTC
    - cron: '0 9 * * 1'
  workflow_dispatch:
  push:
    paths:
      - '**/build.gradle*'
      - '**/gradle.properties'
      - 'gradle/libs.versions.toml'

jobs:
  dependency-check:
    runs-on: ubuntu-latest
    
    permissions:
      contents: read
      security-events: write
      
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        
    - name: Setup Android SDK
      uses: android-actions/setup-android@v3
      
    - name: Cache Gradle packages
      uses: actions/cache@v4
      with:
        path: |
          ~/.gradle/caches
          ~/.gradle/wrapper
        key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
        restore-keys: |
          ${{ runner.os }}-gradle-
          
    - name: Make gradlew executable
      run: chmod +x gradlew
      
    - name: Generate dependency report
      run: |
        ./gradlew dependencies > dependency-report.txt || true
        echo "Dependency report generated"
        
    - name: Check for known vulnerabilities (OWASP)
      run: |
        # Download OWASP Dependency Check CLI
        wget -q https://github.com/jeremylong/DependencyCheck/releases/download/v9.0.8/dependency-check-9.0.8-release.zip
        unzip -q dependency-check-9.0.8-release.zip
        
        # Run dependency check on Gradle dependencies
        ./dependency-check/bin/dependency-check.sh \
          --project "IRCamera" \
          --scan "./" \
          --format "ALL" \
          --out "./dependency-check-report" \
          --suppression "./dependency-check-suppressions.xml" || true
          
    - name: Upload OWASP Dependency Check Report
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: dependency-check-report
        path: |
          ./dependency-check-report/*
          dependency-report.txt
        retention-days: 30
        
    - name: Check for outdated dependencies
      run: |
        ./gradlew dependencyUpdates > dependency-updates.txt || true
        echo "Dependency updates check completed"
        
    - name: Upload dependency updates report
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: dependency-updates-report
        path: dependency-updates.txt
        retention-days: 7