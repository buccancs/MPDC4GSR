name: Release Build

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Release version"
        required: true
        default: "1.0.0"
      build_type:
        description: "Build type"
        required: true
        default: "release"
        type: choice
        options:
          - debug
          - release

jobs:
  build-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Generate release notes
        id: release_notes
        run: |
          echo "RELEASE_NOTES<<EOF" >> $GITHUB_OUTPUT
          echo "## Release ${{ github.event.inputs.version || github.ref_name }}" >> $GITHUB_OUTPUT
          echo "" >> $GITHUB_OUTPUT
          echo "### Changes in this release:" >> $GITHUB_OUTPUT
          git log --oneline $(git describe --tags --abbrev=0 HEAD^)..HEAD >> $GITHUB_OUTPUT || echo "- Initial release" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Run tests before release
        run: ./gradlew test --continue

      - name: Run lint checks
        run: ./gradlew lint --continue

      - name: Build release APK
        run: ./gradlew assembleRelease --continue
        continue-on-error: true

      - name: Build debug APK (fallback)
        if: failure()
        run: ./gradlew assembleDebug --continue

      - name: Sign APK (if keystore available)
        if: env.SIGNING_KEY_ALIAS && env.SIGNING_KEY_PASSWORD && env.SIGNING_STORE_PASSWORD
        run: |
          echo "Signing would be performed here with proper keystore"
          echo "Current build uses the keystore configuration in build.gradle.kts"
        env:
          SIGNING_KEY_ALIAS: ${{ secrets.SIGNING_KEY_ALIAS }}
          SIGNING_KEY_PASSWORD: ${{ secrets.SIGNING_KEY_PASSWORD }}
          SIGNING_STORE_PASSWORD: ${{ secrets.SIGNING_STORE_PASSWORD }}

      - name: Rename APK files
        run: |
          mkdir -p release-artifacts
          find app/build/outputs/apk -name "*.apk" -exec cp {} release-artifacts/ \;
          cd release-artifacts
          for file in *.apk; do
            if [[ $file == *"release"* ]]; then
              mv "$file" "IRCamera-${{ github.event.inputs.version || github.ref_name }}-release.apk"
            elif [[ $file == *"debug"* ]]; then
              mv "$file" "IRCamera-${{ github.event.inputs.version || github.ref_name }}-debug.apk"
            fi
          done
          ls -la

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: release-apk-${{ github.event.inputs.version || github.ref_name }}
          path: release-artifacts/*.apk
          retention-days: 30

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.ref_name }}
          release_name: Release ${{ github.ref_name }}
          body: ${{ steps.release_notes.outputs.RELEASE_NOTES }}
          draft: false
          prerelease: false

      - name: Upload Release Assets
        if: startsWith(github.ref, 'refs/tags/v')
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: ./release-artifacts/
          asset_name: IRCamera-APKs.zip
          asset_content_type: application/zip
