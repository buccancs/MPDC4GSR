name: Ultimate Quality System - Intelligent Validation & Recovery

on:
  push:
    branches: [ main, develop, 'copilot/**' ]
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:
    inputs:
      recovery_mode:
        description: 'Enable advanced recovery mode'
        required: false
        default: 'false'
        type: boolean
      validation_level:
        description: 'Validation level'
        required: false
        default: 'comprehensive'
        type: choice
        options:
          - 'quick'
          - 'comprehensive'
          - 'enterprise'

jobs:
  intelligent-validation:
    name: 🧠 Intelligent Code Validation
    runs-on: ubuntu-latest
    timeout-minutes: 30
    
    outputs:
      quality-score: ${{ steps.validation.outputs.quality-score }}
      needs-recovery: ${{ steps.validation.outputs.needs-recovery }}
      total-files: ${{ steps.validation.outputs.total-files }}
      
    steps:
    - name: 📋 Checkout Repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
        
    - name: 🐍 Setup Python Environment
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
        cache: 'pip'
        
    - name: ☕ Setup Java Environment
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'
        
    - name: 📦 Install Analysis Dependencies
      run: |
        pip install -q pyyaml asyncio
        sudo apt-get update -qq
        sudo apt-get install -y -qq xmllint yamllint shellcheck
        
    - name: 🧠 Run Intelligent Validation
      id: validation
      run: |
        echo "🚀 Starting Intelligent Validation System..."
        
        # Make scripts executable
        chmod +x advanced_system_recovery.sh
        chmod +x intelligent_validation_system.py
        
        # Run intelligent validation
        python3 intelligent_validation_system.py . > validation_output.txt 2>&1 || true
        
        # Extract metrics
        if [ -f "INTELLIGENT_VALIDATION_REPORT.md" ]; then
          QUALITY_SCORE=$(grep "Quality Score" INTELLIGENT_VALIDATION_REPORT.md | grep -o '[0-9]\+\.[0-9]\+' || echo "0")
          TOTAL_FILES=$(grep "Total Files Analyzed" INTELLIGENT_VALIDATION_REPORT.md | grep -o '[0-9,]\+' | tr -d ',' || echo "0")
          ERROR_FILES=$(grep "Files with Errors" INTELLIGENT_VALIDATION_REPORT.md | grep -o '[0-9,]\+' | tr -d ',' || echo "0")
          
          echo "quality-score=$QUALITY_SCORE" >> $GITHUB_OUTPUT
          echo "total-files=$TOTAL_FILES" >> $GITHUB_OUTPUT
          echo "error-files=$ERROR_FILES" >> $GITHUB_OUTPUT
          
          if (( $(echo "$ERROR_FILES > 10" | bc -l) )); then
            echo "needs-recovery=true" >> $GITHUB_OUTPUT
          else
            echo "needs-recovery=false" >> $GITHUB_OUTPUT
          fi
          
          echo "📊 Quality Score: $QUALITY_SCORE/100"
          echo "📁 Files Analyzed: $TOTAL_FILES"
          echo "❌ Error Files: $ERROR_FILES"
        else
          echo "⚠️ Validation report not generated"
          echo "quality-score=0" >> $GITHUB_OUTPUT
          echo "needs-recovery=true" >> $GITHUB_OUTPUT
        fi
        
    - name: 📊 Display Validation Results
      run: |
        echo "=== INTELLIGENT VALIDATION RESULTS ==="
        cat validation_output.txt || echo "No validation output"
        
        if [ -f "INTELLIGENT_VALIDATION_REPORT.md" ]; then
          echo ""
          echo "=== VALIDATION REPORT SUMMARY ==="
          head -20 INTELLIGENT_VALIDATION_REPORT.md
        fi
        
    - name: 🔄 Upload Validation Artifacts
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: validation-results
        path: |
          INTELLIGENT_VALIDATION_REPORT.md
          validation_output.txt
          recovery_operations.log
        retention-days: 7

  advanced-recovery:
    name: 🛠️ Advanced System Recovery
    runs-on: ubuntu-latest
    needs: intelligent-validation
    if: ${{ needs.intelligent-validation.outputs.needs-recovery == 'true' || github.event.inputs.recovery_mode == 'true' }}
    timeout-minutes: 20
    
    steps:
    - name: 📋 Checkout Repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
        token: ${{ secrets.GITHUB_TOKEN }}
        
    - name: ⚙️ Configure Git
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action - Recovery System"
        
    - name: ☕ Setup Java Environment
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'
        
    - name: 🛠️ Run Advanced Recovery
      run: |
        echo "🚀 Starting Advanced System Recovery..."
        
        # Make recovery script executable
        chmod +x advanced_system_recovery.sh
        
        # Run recovery system
        ./advanced_system_recovery.sh
        
        echo "✅ Recovery completed"
        
    - name: 📋 Validate Recovery Results
      run: |
        echo "🔍 Validating recovery results..."
        
        # Run quick validation after recovery
        python3 intelligent_validation_system.py . || true
        
        if [ -f "RECOVERY_REPORT.md" ]; then
          echo "📊 Recovery Report Generated"
          cat RECOVERY_REPORT.md
        fi
        
    - name: 💾 Commit Recovery Changes
      run: |
        if [ -n "$(git status --porcelain)" ]; then
          echo "📝 Committing recovery changes..."
          git add .
          git commit -m "🛠️ Automated system recovery - fix corruption and validation issues
          
          - Applied intelligent pattern repair
          - Restored corrupted files from backup
          - Enhanced validation system
          - Quality score improvement targeted
          
          Co-authored-by: GitHub Actions <action@github.com>"
          
          # Push changes
          git push origin HEAD:${{ github.ref_name }} || echo "⚠️ Push failed - manual review needed"
        else
          echo "ℹ️ No changes to commit"
        fi
        
    - name: 🔄 Upload Recovery Artifacts
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: recovery-results
        path: |
          RECOVERY_REPORT.md
          recovery_operations.log
          system_backups/
        retention-days: 7

  quality-gates:
    name: 🚪 Quality Gates & Enforcement
    runs-on: ubuntu-latest
    needs: [intelligent-validation, advanced-recovery]
    if: always()
    timeout-minutes: 10
    
    steps:
    - name: 📋 Checkout Repository
      uses: actions/checkout@v4
      
    - name: 🎯 Evaluate Quality Gates
      run: |
        QUALITY_SCORE="${{ needs.intelligent-validation.outputs.quality-score }}"
        TOTAL_FILES="${{ needs.intelligent-validation.outputs.total-files }}"
        
        echo "🎯 Quality Gate Evaluation"
        echo "=========================="
        echo "Quality Score: $QUALITY_SCORE/100"
        echo "Total Files: $TOTAL_FILES"
        echo "Recovery Ran: ${{ needs.advanced-recovery.result != 'skipped' }}"
        
        # Quality gate thresholds
        MIN_QUALITY_SCORE=75
        
        if (( $(echo "$QUALITY_SCORE >= $MIN_QUALITY_SCORE" | bc -l) )); then
          echo "✅ Quality gate PASSED - Score: $QUALITY_SCORE >= $MIN_QUALITY_SCORE"
          echo "gate-status=passed" >> $GITHUB_ENV
        else
          echo "❌ Quality gate FAILED - Score: $QUALITY_SCORE < $MIN_QUALITY_SCORE"
          echo "gate-status=failed" >> $GITHUB_ENV
        fi
        
    - name: 📊 Generate Quality Summary
      run: |
        cat > QUALITY_GATE_SUMMARY.md << EOF
        # Quality Gate Summary
        
        ## Results
        - **Quality Score**: ${{ needs.intelligent-validation.outputs.quality-score }}/100
        - **Total Files**: ${{ needs.intelligent-validation.outputs.total-files }}
        - **Status**: ${{ env.gate-status }}
        - **Recovery Applied**: ${{ needs.advanced-recovery.result != 'skipped' }}
        
        ## Analysis
        - **Validation Time**: $(date)
        - **Branch**: ${{ github.ref_name }}
        - **Commit**: ${{ github.sha }}
        
        ## Next Steps
        EOF
        
        if [ "${{ env.gate-status }}" = "failed" ]; then
          cat >> QUALITY_GATE_SUMMARY.md << EOF
        ⚠️ **Action Required**: Quality score below threshold
        - Review validation report for specific issues
        - Apply recommended fixes
        - Re-run validation after improvements
        EOF
        else
          cat >> QUALITY_GATE_SUMMARY.md << EOF
        ✅ **All Clear**: Quality standards met
        - Continue with development workflow
        - Monitor quality trends over time
        EOF
        fi
        
        cat QUALITY_GATE_SUMMARY.md
        
    - name: 🔄 Upload Quality Summary
      uses: actions/upload-artifact@v4
      with:
        name: quality-gate-summary
        path: QUALITY_GATE_SUMMARY.md
        retention-days: 30
        
    - name: 🚨 Quality Gate Enforcement
      if: env.gate-status == 'failed' && github.event_name == 'pull_request'
      run: |
        echo "❌ Quality gate failed - blocking merge"
        echo "Quality score ${{ needs.intelligent-validation.outputs.quality-score }} is below required threshold"
        exit 1

  deployment-readiness:
    name: 🚀 Deployment Readiness Check
    runs-on: ubuntu-latest
    needs: [quality-gates]
    if: ${{ needs.quality-gates.result == 'success' && github.ref == 'refs/heads/main' }}
    
    steps:
    - name: ✅ Deployment Ready
      run: |
        echo "🚀 System is ready for deployment!"
        echo "✅ All quality gates passed"
        echo "✅ Code validation successful"
        echo "✅ Recovery systems operational"