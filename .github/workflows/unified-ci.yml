name: Unified CI/CD Pipeline

on:
  push:
    branches: [main, develop, 'feature/**', 'copilot/**']
  pull_request:
    branches: [main, develop]
  workflow_dispatch:
    inputs:
      validation_mode:
        description: 'Validation mode'
        required: false
        default: 'core'
        type: choice
        options:
        - quick
        - core
        - full

jobs:
  validate:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        mode: [quick, core]
      fail-fast: false
      
    steps:
    - name: Checkout
      uses: actions/checkout@v4
      
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        
    - name: Setup Android SDK
      uses: android-actions/setup-android@v3
      
    - name: Grant execute permissions
      run: |
        chmod +x gradlew
        chmod +x validate.sh
        chmod +x quality_format.sh
        
    - name: Cache Gradle packages
      uses: actions/cache@v4
      with:
        path: |
          ~/.gradle/caches
          ~/.gradle/wrapper
        key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
        restore-keys: |
          ${{ runner.os }}-gradle-
          
    - name: Install validation tools
      run: |
        sudo apt-get update
        sudo apt-get install -y xmllint
        curl -sSLO https://github.com/pinterest/ktlint/releases/download/0.50.0/ktlint && chmod a+x ktlint && sudo mv ktlint /usr/local/bin/
        
    - name: Run validation
      run: |
        mode="${{ matrix.mode }}"
        if [[ "${{ github.event.inputs.validation_mode }}" != "" ]]; then
          mode="${{ github.event.inputs.validation_mode }}"
        fi
        ./validate.sh "$mode" --auto-fix
        
    - name: Check for changes
      id: changes
      run: |
        if [[ -n "$(git status --porcelain)" ]]; then
          echo "has_changes=true" >> $GITHUB_OUTPUT
        else
          echo "has_changes=false" >> $GITHUB_OUTPUT
        fi
        
    - name: Commit auto-fixes
      if: steps.changes.outputs.has_changes == 'true' && github.event_name != 'pull_request'
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add .
        git commit -m "style: Auto-fix formatting and validation issues [skip ci]"
        git push
        
  quality-analysis:
    runs-on: ubuntu-latest
    needs: validate
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop'
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4
      
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        
    - name: Grant execute permissions
      run: chmod +x quality_format.sh
      
    - name: Install analysis tools
      run: |
        sudo apt-get update
        sudo apt-get install -y xmllint
        curl -sSLO https://github.com/pinterest/ktlint/releases/download/0.50.0/ktlint && chmod a+x ktlint && sudo mv ktlint /usr/local/bin/
        npm install -g prettier
        
    - name: Run quality analysis
      run: ./quality_format.sh full
      
    - name: Upload quality report
      uses: actions/upload-artifact@v4
      with:
        name: quality-report
        path: quality_report.json
        retention-days: 30